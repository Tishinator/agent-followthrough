name: test

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  node-test:
    runs-on: linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run deterministic project and external review tests
        run: |
          npm test
          node --test test/external/unit/*.test.js
